<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MHS Tankskib Runner</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#050e1a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Courier New', monospace;
    overflow:hidden;
    touch-action:none;
  }
  #gameCanvas {
    display:block;
    max-width:100vw;
    max-height:100vh;
    image-rendering:pixelated;
  }
  #mobileControls {
    display:none;
    position:fixed; bottom:0; left:0; right:0;
    padding:12px 20px 24px;
    background:rgba(0,0,0,0.7);
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .btn {
    background:rgba(30,60,140,0.8);
    border:2px solid rgba(50,100,200,0.6);
    border-radius:12px;
    color:#fff;
    font-size:22px;
    padding:14px 22px;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    min-width:60px; text-align:center;
  }
  .btn:active { background:rgba(60,120,255,0.8); transform:scale(0.95); }
  #btnSpace { background:rgba(183,52,42,0.8); border-color:rgba(220,80,60,0.8); flex:1; }
  @media (max-width: 900px) {
    #mobileControls { display:flex; }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="mobileControls">
  <button class="btn" id="btnUp">▲</button>
  <button class="btn" id="btnDown">▼</button>
  <button class="btn" id="btnSpace">LEVER OLIE</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  MHS TANKSKIB RUNNER — HTML5/Canvas version
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const W = 900, H = 560;
canvas.width  = W;
canvas.height = H;

// Skalér til skærm
function resize() {
  const scale = Math.min(window.innerWidth/W, window.innerHeight/H, 1.0);
  canvas.style.width  = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}
window.addEventListener('resize', resize); resize();

// ── Lyd (Web Audio API) ────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ac = null;
function initAudio() { if (!ac) ac = new AudioCtx(); }

function playTone(freq, type, duration, vol=0.18, when=0) {
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type; o.frequency.value = freq;
  const t = ac.currentTime + when;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+duration);
  o.start(t); o.stop(t+duration);
}

function sfxCollect()  { initAudio(); playTone(660,'sine',0.12,0.2); playTone(880,'sine',0.12,0.2,0.07); }
function sfxHit()      { initAudio(); playTone(120,'sawtooth',0.3,0.25); }
function sfxDeliver()  { initAudio(); [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.18,0.22,i*0.08)); }
function sfxBossWarn() { initAudio(); playTone(220,'square',0.5,0.3); playTone(180,'square',0.5,0.3,0.3); }
function sfxCanon()    { initAudio(); playTone(80,'sawtooth',0.2,0.3); playTone(60,'sawtooth',0.15,0.2,0.05); }

// Bølge-baggrundslyd
let engineNode=null, engineGain=null;
function startEngine() {
  if (!ac||engineNode) return;
  engineNode = ac.createOscillator();
  engineGain = ac.createGain();
  engineNode.connect(engineGain); engineGain.connect(ac.destination);
  engineNode.type='sawtooth'; engineNode.frequency.value=55;
  engineGain.gain.value=0.04;
  engineNode.start();
}
function stopEngine() { if(engineNode){engineNode.stop();engineNode=null;engineGain=null;} }

// ── Konstanter ─────────────────────────────────────────
const LANE_Y    = [200, 290, 380];
const NUM_LANES = 3;
const MHS_RED   = '#b7342a';
const MHS_BLUE  = '#1e3c8c';
const HULL_COL  = '#781423';
const DECK_COL  = '#3c3c50';
const PIPE_COL  = '#a05a1e';

// ── Hjælpefunktioner ───────────────────────────────────
function rnd(a,b)  { return a+Math.random()*(b-a); }
function rndInt(a,b){ return Math.floor(rnd(a,b+1)); }

function drawRoundRect(x,y,w,h,r,fill,stroke,sw=1) {
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  if(fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke(); }
}

// ── Hav / baggrund ─────────────────────────────────────
let waveOffset=0;
function drawOcean(stormAlpha=0) {
  // Gradient baggrund
  const grad = ctx.createLinearGradient(0,0,0,H);
  const dark = lerpColor([8,35,70],[30,20,50],stormAlpha/255);
  const mid  = lerpColor([12,55,105],[30,20,50],stormAlpha/255);
  grad.addColorStop(0, `rgb(${dark})`);
  grad.addColorStop(1, `rgb(${mid})`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Bølger
  const wc = stormAlpha>0 ? `rgba(15,50,80,0.7)` : 'rgba(25,90,150,0.7)';
  ctx.strokeStyle=wc; ctx.lineWidth=2;
  for(let row=0;row<6;row++){
    const yb=180+row*65;
    for(let x=-40;x<W+40;x+=55){
      const wx=((x+Math.floor(waveOffset*(0.5+row*0.12)))%(W+80))-40;
      const wy=yb+Math.sin((x+waveOffset*0.8)*0.04+row)*5;
      ctx.beginPath();
      ctx.ellipse(wx+24,wy,24,4.5,0,0,Math.PI*2);
      ctx.stroke();
    }
  }
}

function lerpColor(a,b,t) {
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}

function drawLanes() {
  LANE_Y.forEach(ly=>{
    ctx.setLineDash([20,20]); ctx.strokeStyle='rgba(30,70,120,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,ly+24); ctx.lineTo(W,ly+24); ctx.stroke();
    ctx.setLineDash([]);
  });
}

// ── MHS Logo ───────────────────────────────────────────
function drawMHSLogo(x,y,w=70,h=16) {
  drawRoundRect(x,y,w,h,2,MHS_RED,'rgba(200,160,155,0.8)');
  ctx.fillStyle='white';
  ctx.font=`bold ${h-2}px serif`;
  ctx.fillText('M',x+3,y+h-3);
  ctx.fillText('H',x+w/3,y+h-3);
  ctx.fillText('S',x+w*2/3,y+h-3);
  ctx.fillStyle='rgba(140,20,15,0.9)';
  ctx.fillRect(x+2,y+h-3,w-4,3);
}

// ── Røg partikler ──────────────────────────────────────
function updateSmoke(particles, sx, sy) {
  if(Math.random()<0.4) particles.push({x:sx,y:sy,vx:rnd(-0.4,0.1),vy:rnd(-1.1,-0.4),life:rnd(25,50),size:rnd(3,7)});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=1;p.size+=0.12;});
  return particles.filter(p=>p.life>0);
}
function drawSmoke(particles) {
  particles.forEach(p=>{
    const a=Math.floor(170*p.life/50)/255;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,200,210,${a})`; ctx.fill();
  });
}

// ══════════════════════════════════════════════════════
//  TANKSKIB
// ══════════════════════════════════════════════════════
class Tankskib {
  constructor() {
    this.lane=1; this.x=110; this.y=LANE_Y[1]; this.targetY=LANE_Y[1];
    this.health=100; this.score=0; this.olie=0;
    this.hitFlash=0; this.invincible=0; this.bob=0;
    this.smoke=[]; this.w=120; this.h=24;
  }
  moveUp()   { if(this.lane>0)          { this.lane--; this.targetY=LANE_Y[this.lane]; }}
  moveDown() { if(this.lane<NUM_LANES-1){ this.lane++; this.targetY=LANE_Y[this.lane]; }}
  update() {
    const dy=this.targetY-this.y;
    this.y += Math.abs(dy)>1 ? dy*0.18 : dy;
    this.bob+=0.05; this.y+=Math.sin(this.bob)*0.05;
    if(this.hitFlash>0)   this.hitFlash--;
    if(this.invincible>0) this.invincible--;
    this.smoke = updateSmoke(this.smoke, this.x+13, this.y-22);
  }
  takeHit(dmg) {
    if(this.invincible>0) return;
    this.health-=dmg; this.hitFlash=20; this.invincible=45; sfxHit();
  }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y), w=this.w, h=this.h;
    const hullCol = this.hitFlash>0 ? '#ffe600' : HULL_COL;

    // Skygge
    ctx.fillStyle='rgba(5,18,45,0.5)';
    ctx.beginPath(); ctx.ellipse(x+w/2,y+h+7,w/2-8,6,0,0,Math.PI*2); ctx.fill();

    // Skrog
    ctx.fillStyle=hullCol;
    ctx.beginPath();
    ctx.moveTo(x+w,y+4); ctx.lineTo(x+w,y+h-2); ctx.lineTo(x+w-6,y+h+7);
    ctx.lineTo(x+22,y+h+7); ctx.lineTo(x+10,y+h+1); ctx.lineTo(x,y+h-6);
    ctx.lineTo(x,y+2); ctx.lineTo(x+w-16,y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(90,90,110,0.8)'; ctx.lineWidth=1.5; ctx.stroke();

    // Vandlinje
    ctx.strokeStyle=MHS_RED; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+3,y+h); ctx.lineTo(x+w-3,y+h); ctx.stroke();

    // Fordæk
    drawRoundRect(x+30,y-5,w-40,8,2,DECK_COL);
    drawRoundRect(x+30,y-2,w-40,3,1,PIPE_COL);

    // Skorsten (agter) — blå med S
    const skx=x+4, skw=12, skh=24;
    drawRoundRect(skx,y-skh,skw,skh,2,MHS_BLUE,'rgba(50,85,170,0.8)');
    ctx.fillStyle='rgba(15,15,20,0.9)'; ctx.fillRect(skx,y-skh,skw,4);
    ctx.fillStyle='white'; ctx.font=`bold ${skh-8}px serif`;
    const sm=ctx.measureText('S');
    ctx.fillText('S', skx+(skw-sm.width)/2, y-skh/2+4);

    // Bro (hvid)
    const brox=skx+skw+3, brow=34, broh=26;
    drawRoundRect(brox,y-10,brow,10,'rgba(220,220,215,1)');
    drawRoundRect(brox,y-broh,brow,broh-10,3,'rgba(240,240,235,1)','rgba(170,170,165,0.8)');
    drawRoundRect(brox-3,y-broh+5,brow+6,7,2,'rgba(225,225,220,1)');
    for(let i=0;i<3;i++) drawRoundRect(brox+4+i*10,y-broh+3,8,5,1,'rgba(100,200,255,0.9)');

    // MHS logo på siden
    drawMHSLogo(x+w/2-18, y+3, 50, 12);

    // Røg
    drawSmoke(this.smoke);
  }
  getRect() { return {x:this.x+8,y:this.y,w:this.w-16,h:this.h}; }
}

// ── Kollision ──────────────────────────────────────────
function rectsOverlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ══════════════════════════════════════════════════════
//  NORMALE OBJEKTER
// ══════════════════════════════════════════════════════
class OlieTønde {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(0,200); this.y=LANE_Y[this.lane];
    this.speed=speed; this.bob=rnd(0,Math.PI*2); this.value=rndInt(1,3)*10; this.dead=false;
  }
  update() { this.x-=this.speed; this.bob+=0.06; }
  draw() {
    if(this.dead) return;
    const x=Math.round(this.x), y=Math.round(this.y+Math.sin(this.bob)*4);
    ctx.fillStyle='#b45a14'; ctx.beginPath(); ctx.ellipse(x,y,12,14,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#dc8228'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.strokeStyle='#8c3c0a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-12,y-5); ctx.lineTo(x+12,y-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-12,y+4); ctx.lineTo(x+12,y+4); ctx.stroke();
    ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace';
    ctx.fillText(`+${this.value}`,x-10,y-20);
  }
  getRect() { return {x:this.x-12,y:this.y-14,w:24,h:28}; }
}

class Havn {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(200,400); this.y=LANE_Y[this.lane];
    this.speed=speed; this.active=true; this.pulse=0;
  }
  update() { this.x-=this.speed*0.6; this.pulse+=0.05; }
  draw() {
    if(!this.active) return;
    const x=Math.round(this.x), y=Math.round(this.y);
    // Pulserende ring
    const r=28+Math.sin(this.pulse)*5;
    ctx.strokeStyle=`rgba(50,200,80,${0.4+Math.sin(this.pulse)*0.2})`;
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y+10,r,0,Math.PI*2); ctx.stroke();
    drawRoundRect(x-40,y+8,80,20,3,'rgba(70,70,60,0.9)','#32c850',1.5);
    ctx.strokeStyle='#444'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x+10,y+8); ctx.lineTo(x+10,y-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+10,y-14); ctx.lineTo(x+34,y-14); ctx.stroke();
    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x+34,y-14); ctx.lineTo(x+34,y); ctx.stroke();
    drawRoundRect(x-38,y-10,34,20,2,'rgba(50,65,50,0.9)','#32c850');
    ctx.fillStyle='#32c850'; ctx.font='bold 11px monospace'; ctx.fillText('HAVN',x-18,y+22);
  }
  getRect() { return {x:this.x-40,y:this.y-10,w:80,h:38}; }
}

class Isbjerg {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(0,300); this.y=LANE_Y[this.lane];
    this.speed=speed; this.size=rndInt(22,36);
  }
  update() { this.x-=this.speed; }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y), s=this.size;
    ctx.fillStyle='rgba(200,230,255,0.9)';
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-s/2,y+s); ctx.lineTo(x+s/2,y+s); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='rgba(100,160,210,0.7)';
    ctx.beginPath(); ctx.moveTo(x-s/2,y+s); ctx.lineTo(x-s*3/4,y+s+s/2); ctx.lineTo(x+s*3/4,y+s+s/2); ctx.lineTo(x+s/2,y+s); ctx.closePath(); ctx.fill();
  }
  getRect() { return {x:this.x-this.size/2,y:this.y,w:this.size,h:this.size}; }
}

class Haj {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(0,200); this.y=LANE_Y[this.lane];
    this.speed=speed*1.1; this.bob=rnd(0,Math.PI*2); this.s=rndInt(28,42);
  }
  update() { this.x-=this.speed; this.bob+=0.05; this.y=LANE_Y[this.lane]+Math.sin(this.bob)*3; }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y), s=this.s;
    ctx.fillStyle='rgba(100,110,120,0.9)';
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-7,y-24); ctx.lineTo(x+s/2,y); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s,y-2); ctx.lineTo(x+s+14,y-10); ctx.lineTo(x+s+14,y+7); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+s/2,y+5,s/2+9,5,0,0,Math.PI*2); ctx.fill();
  }
  getRect() { return {x:this.x-8,y:this.y-8,w:this.s+22,h:18}; }
}

class Kaskelothval {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(50,250); this.y=LANE_Y[this.lane];
    this.speed=speed*0.7; this.bob=rnd(0,Math.PI*2); this.tail=0;
  }
  update() { this.x-=this.speed; this.bob+=0.03; this.tail+=0.08; }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y+Math.sin(this.bob)*4), s=55;
    ctx.fillStyle='rgba(60,80,120,0.9)';
    // Rygfinne
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+10,y-20); ctx.lineTo(x+20,y); ctx.closePath(); ctx.fill();
    // Krop
    ctx.beginPath(); ctx.ellipse(x,y,s,14,0,0,Math.PI*2); ctx.fill();
    // Mave
    ctx.fillStyle='rgba(180,190,210,0.7)';
    ctx.beginPath(); ctx.ellipse(x,y+6,s-8,8,0,0,Math.PI*2); ctx.fill();
    // Hoved
    ctx.fillStyle='rgba(60,80,120,0.9)';
    ctx.beginPath(); ctx.roundRect(x-s-20,y-12,26,24,4); ctx.fill();
    // Øje
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x-s-6,y-4,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a1e'; ctx.beginPath(); ctx.arc(x-s-5,y-4,2,0,Math.PI*2); ctx.fill();
    // Hale
    const ang=(Math.sin(this.tail)*18)*Math.PI/180;
    const tx=x+s, ty=y;
    ctx.fillStyle='rgba(60,80,120,0.9)';
    ctx.beginPath(); ctx.moveTo(tx,ty-5); ctx.lineTo(tx,ty+5);
    ctx.lineTo(tx+Math.cos(ang-0.4)*28, ty+Math.sin(ang-0.4)*28); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx,ty-5); ctx.lineTo(tx,ty+5);
    ctx.lineTo(tx+Math.cos(ang+0.4)*28, ty+Math.sin(ang+0.4)*28); ctx.closePath(); ctx.fill();
  }
  getRect() { return {x:this.x-55,y:this.y-14,w:130,h:28}; }
}

class Delfinflok {
  constructor(speed) {
    this.lane=rndInt(0,2); this.x=W+rnd(0,100); this.y=LANE_Y[this.lane];
    this.speed=speed*1.3; this.timer=0;
    this.delfiner=[...Array(4)].map((_,i)=>({off:i*28,phase:rnd(0,Math.PI*2)}));
  }
  update() { this.x-=this.speed; this.timer+=0.09; }
  draw() {
    this.delfiner.forEach(d=>{
      const dx=Math.round(this.x-d.off), dy=Math.round(this.y+Math.sin(this.timer+d.phase)*14);
      const j=Math.sin(this.timer+d.phase)>0.2;
      ctx.fillStyle=j?'rgba(110,150,200,0.9)':'rgba(80,110,150,0.9)';
      ctx.beginPath(); ctx.ellipse(dx,dy,14,6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(dx-17,dy,6,3,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(50,80,120,0.9)';
      ctx.beginPath(); ctx.moveTo(dx,dy-6); ctx.lineTo(dx+5,dy-16); ctx.lineTo(dx+12,dy-6); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(80,110,150,0.9)';
      ctx.beginPath(); ctx.moveTo(dx+14,dy-2); ctx.lineTo(dx+22,dy-8); ctx.lineTo(dx+22,dy+5); ctx.closePath(); ctx.fill();
    });
  }
  getRect() { return {x:-200,y:-200,w:1,h:1}; }
}

function spawnObstacle(speed) {
  const r=Math.random();
  if(r<0.30) return new Isbjerg(speed);
  if(r<0.55) return new Haj(speed);
  if(r<0.75) return new Kaskelothval(speed);
  return new Delfinflok(speed);
}

// ══════════════════════════════════════════════════════
//  BOSS: STORMFRONT
// ══════════════════════════════════════════════════════
class StormfrontBoss {
  constructor() {
    this.wallX=-60; this.speed=1.2; this.timer=1800; this.active=true;
    this.lightnings=[]; this.ltimer=0;
  }
  update() {
    this.wallX+=this.speed; this.timer--;
    this.ltimer--;
    if(this.ltimer<=0) {
      this.lightnings.push({x:this.wallX+rnd(10,60),life:rndInt(6,12)});
      this.ltimer=rndInt(15,40);
    }
    this.lightnings=this.lightnings.filter(l=>{ l.life--; return l.life>0; });
    if(this.timer<=0) this.active=false;
  }
  hitsShip(skib) { return skib.x < this.wallX+55; }
  draw() {
    const wx=Math.round(this.wallX);
    // Gradient stormvæg
    for(let i=0;i<80;i++) {
      const a=Math.max(0,(200-i*2.5))/255;
      ctx.fillStyle=`rgba(${Math.max(0,30-i/3)},${Math.max(0,20-i/4)},${Math.max(0,50-i/2)},${a})`;
      ctx.fillRect(wx-i,0,2,H);
    }
    // Lyn
    this.lightnings.forEach(l=>{
      ctx.strokeStyle=`rgba(220,220,100,${l.life/12})`;
      ctx.lineWidth=2; ctx.beginPath();

      while(cy<H){ cy+=rndInt(20,50); ctx.lineTo(l.x+rnd(-15,15),cy); }

    ctx.fillStyle='rgba(60,10,10,0.8)'; ctx.fillRect(0,57,W,8);
    ctx.fillStyle=`rgb(200,50,50)`; ctx.fillRect(0,57,W*frac,8);

    ctx.textAlign='center'; ctx.fillText('⚡ STORM — HOLD FARTEN OPPE! ⚡',W/2,82); ctx.textAlign='left';
  }
}

// ══════════════════════════════════════════════════════
//  BOSS: PIRATSKIB
// ══════════════════════════════════════════════════════
class PiratskibBoss {
  constructor() {
    this.x=W+100; this.y=55; this.health=100; this.maxHp=100;
    this.active=true; this.canonTimer=90; this.kugler=[];
    this.bob=0; this.phase='enter'; this.targetX=W-230; this.smoke=[];
  }
  update(worldSpeed) {
    this.bob+=0.04;
    if(this.phase==='enter') {
      this.x+=(this.targetX-this.x)*0.05;
      if(Math.abs(this.x-this.targetX)<5) this.phase='fight';
    } else if(this.phase==='fight') {
      this.x=this.targetX+Math.sin(this.bob*0.5)*15;
      this.canonTimer--;
      if(this.canonTimer<=0) {
        const lane=rndInt(0,2);
        this.kugler.push({x:this.x+30,y:LANE_Y[lane]-10,lane,speed:worldSpeed*1.1});
        this.canonTimer=rndInt(50,100); sfxCanon();
        for(let i=0;i<6;i++) this.smoke.push({x:this.x+30,y:this.y+90,vx:rnd(-2,-0.5),vy:rnd(-1.5,0.5),life:20,size:rnd(4,10)});
      }
      if(this.health<=0) this.phase='leave';
    } else if(this.phase==='leave') {
      this.x+=4; if(this.x>W+200) this.active=false;
    }
    this.kugler=this.kugler.filter(k=>k.x>-20);
    this.kugler.forEach(k=>k.x-=k.speed);
    this.smoke.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size+=0.3;});
    this.smoke=this.smoke.filter(p=>p.life>0);
  }
  takeHit() { this.health=Math.max(0,this.health-10); }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y+Math.sin(this.bob)*5);
    ctx.fillStyle='rgba(35,25,15,0.95)';
    ctx.beginPath(); ctx.moveTo(x,y+30); ctx.lineTo(x+20,y+70); ctx.lineTo(x+220,y+70); ctx.lineTo(x+230,y+30); ctx.lineTo(x+190,y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(55,40,25,0.8)'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='#dc3232'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x+20,y+68); ctx.lineTo(x+220,y+68); ctx.stroke();
    // Mast + sejl
    ctx.strokeStyle='rgba(30,20,10,0.9)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(x+120,y+30); ctx.lineTo(x+120,y-60); ctx.stroke();
    ctx.fillStyle='rgba(220,210,190,0.9)';
    ctx.beginPath(); ctx.moveTo(x+120,y-60); ctx.lineTo(x+120,y); ctx.lineTo(x+180,y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(200,190,170,0.5)'; ctx.lineWidth=1; ctx.stroke();
    // Piratflag
    ctx.fillStyle='rgba(10,10,10,0.95)'; ctx.fillRect(x+120,y-65,24,16);
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x+132,y-58,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x+129,y-52); ctx.lineTo(x+135,y-52); ctx.stroke();
    // Kanon
    drawRoundRect(x+25,y+40,40,14,3,'rgba(50,40,30,0.9)');
    drawRoundRect(x+20,y+42,12,10,2,'rgba(30,20,15,0.9)');
    // HP bar
    ctx.fillStyle='rgba(60,10,10,0.8)'; ctx.fillRect(x,y-15,230,8);
    ctx.fillStyle='#dc3232'; ctx.fillRect(x,y-15,230*this.health/this.maxHp,8);
    ctx.strokeStyle='rgba(200,50,50,0.5)'; ctx.lineWidth=1; ctx.strokeRect(x,y-15,230,8);
    ctx.fillStyle='#ff6060'; ctx.font='bold 11px monospace'; ctx.fillText('PIRATSKIB',x+80,y-20);
    // Kugler
    this.kugler.forEach(k=>{
      ctx.fillStyle='rgba(20,20,20,0.95)'; ctx.beginPath(); ctx.arc(k.x,k.y,8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(50,50,50,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
      // Ild-hale
      ctx.fillStyle='rgba(255,120,20,0.6)'; ctx.beginPath(); ctx.arc(k.x+10,k.y,4,0,Math.PI*2); ctx.fill();
    });
    drawSmoke(this.smoke);
  }
  getCannonRects() { return this.kugler.map(k=>({x:k.x-8,y:k.y-8,w:16,h:16})); }
}

// ══════════════════════════════════════════════════════
//  BOSS: BLÆKSPRUTTE
// ══════════════════════════════════════════════════════
class BlæksprutteBoss {
  constructor() {
    this.x=W+80; this.y=300; this.health=100; this.maxHp=100;
    this.active=true; this.bob=0; this.phase='enter'; this.targetX=W-90;
    this.tentakler=[]; this.tentakelTimer=80; this.eyeFlash=0;
  }
  update(worldSpeed) {
    this.bob+=0.05;
    if(this.phase==='enter') {
      this.x+=(this.targetX-this.x)*0.04;
      if(Math.abs(this.x-this.targetX)<5) this.phase='fight';
    } else if(this.phase==='fight') {
      this.x=this.targetX+Math.sin(this.bob*0.3)*20;
      this.tentakelTimer--;
      if(this.tentakelTimer<=0) {
        const lane=rndInt(0,2);
        this.tentakler.push({lane,progress:0,speed:0.018+worldSpeed*0.001,active:true});
        this.tentakelTimer=rndInt(60,110); this.eyeFlash=10;
      }
      this.tentakler.forEach(t=>{ if(t.active) t.progress=Math.min(1,t.progress+t.speed); if(t.progress>=1) t.active=false; });
      this.tentakler=this.tentakler.filter(t=>t.progress<1.2);
      if(this.health<=0) this.phase='leave';
    } else if(this.phase==='leave') {
      this.x+=5; if(this.x>W+200) this.active=false;
    }
    if(this.eyeFlash>0) this.eyeFlash--;
  }
  takeHit() { this.health=Math.max(0,this.health-8); }
  getTentakelRects() {
    const rects=[];
    this.tentakler.forEach(t=>{
      if(!t.active||t.progress<0.3||t.progress>0.85) return;
      const tx=this.x-50-t.progress*400, ty=LANE_Y[t.lane];
      rects.push({x:tx-15,y:ty-15,w:30,h:30});
    });
    return rects;
  }
  draw() {
    const x=Math.round(this.x), y=Math.round(this.y+Math.sin(this.bob)*8);
    // Tentakler
    this.tentakler.forEach(t=>{
      const ly=LANE_Y[t.lane]; const pts=[];
      for(let i=0;i<12;i++){
        const p=i/11; if(p>t.progress) break;
        pts.push([x-30-p*420, ly+Math.sin(p*Math.PI*2+this.bob)*18*(1-p)]);
      }
      if(pts.length>1){
        ctx.strokeStyle='rgba(80,40,100,0.9)'; ctx.lineWidth=6;
        ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
        pts.forEach(p=>ctx.lineTo(p[0],p[1])); ctx.stroke();
        ctx.strokeStyle='rgba(110,60,140,0.7)'; ctx.lineWidth=2; ctx.stroke();
        if(pts.length>0){
          ctx.fillStyle='rgba(120,70,150,0.9)'; ctx.beginPath();
          ctx.arc(pts[pts.length-1][0],pts[pts.length-1][1],7,0,Math.PI*2); ctx.fill();
        }
      }
    });
    // Hoved/mantel
    ctx.fillStyle='rgba(80,40,100,0.95)';
    ctx.beginPath(); ctx.ellipse(x,y-15,40,45,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(100,60,130,0.7)'; ctx.lineWidth=2; ctx.stroke();
    // Spots
    for(let i=0;i<5;i++){
      ctx.fillStyle='rgba(110,55,140,0.8)';
      ctx.beginPath(); ctx.arc(x-20+i*10, y-35+Math.sin(i+this.bob)*5, 4,0,Math.PI*2); ctx.fill();
    }
    // Øjne
    const ec=this.eyeFlash>0?'#ff3232':'#ffc800';
    ctx.fillStyle=ec; ctx.beginPath(); ctx.arc(x-14,y-20,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a14'; ctx.beginPath(); ctx.arc(x-14,y-20,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=ec; ctx.beginPath(); ctx.arc(x+14,y-20,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a14'; ctx.beginPath(); ctx.arc(x+14,y-20,4,0,Math.PI*2); ctx.fill();
    // HP bar
    ctx.fillStyle='rgba(40,10,50,0.8)'; ctx.fillRect(x-40,y-65,80,8);
    ctx.fillStyle='rgba(130,40,160,0.9)'; ctx.fillRect(x-40,y-65,80*this.health/this.maxHp,8);
    ctx.fillStyle='rgba(180,100,200,0.9)'; ctx.font='bold 11px monospace';
    ctx.textAlign='center'; ctx.fillText('BLÆKSPRUTTE',x,y-70); ctx.textAlign='left';
  }
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

// Touch/mobil knapper
document.getElementById('btnUp').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowUp']=true;},{passive:false});
document.getElementById('btnUp').addEventListener('touchend',e=>{e.preventDefault();keys['ArrowUp']=false;},{passive:false});
document.getElementById('btnDown').addEventListener('touchstart',e=>{e.preventDefault();keys['ArrowDown']=true;},{passive:false});
document.getElementById('btnDown').addEventListener('touchend',e=>{e.preventDefault();keys['ArrowDown']=false;},{passive:false});
document.getElementById('btnSpace').addEventListener('touchstart',e=>{e.preventDefault();keys['Space']=true;},{passive:false});
document.getElementById('btnSpace').addEventListener('touchend',e=>{e.preventDefault();keys['Space']=false;},{passive:false});

// Swipe på canvas
let touchStartY=null;
canvas.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY; initAudio();},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(touchStartY===null) return;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dy)>30){ if(dy<0) keys['ArrowUp']=true; else keys['ArrowDown']=true; }
  setTimeout(()=>{keys['ArrowUp']=false;keys['ArrowDown']=false;},100);
  touchStartY=null;
},{passive:true});

// ══════════════════════════════════════════════════════
//  SPIL TILSTAND
// ══════════════════════════════════════════════════════
let state='start'; // start | bossintro | game | bossresult | gameover
let highScore=0;
let skib, worldSpeed, obstacles, tønder, havne;
let obsTimer, tøndeTimer, havnTimer;
let boss=null, bossNextScore, bossCooldown;
let laneCooldown=0, stormAlpha=0;
let reason='';
let bossIntroData=null, bossResultData=null;
let bossIntroReady=false, bossResultTimer=0;
let pendingBossType=null;
let frameCount=0;

function initGame() {
  skib        = new Tankskib();
  worldSpeed  = 3.0;
  obstacles   = []; tønder=[]; havne=[];
  obsTimer    = 60; tøndeTimer=40; havnTimer=rndInt(350,550);
  boss=null; bossNextScore=rndInt(900,1300); bossCooldown=0;
  laneCooldown=0; stormAlpha=0; reason=''; frameCount=0;
  startEngine();
}

function spawnBoss(type) {
  if(type==='storm')   { boss=new StormfrontBoss(); }
  else if(type==='pirat') { boss=new PiratskibBoss(); }
  else if(type==='blæk')  { boss=new BlæksprutteBoss(); }
  else                    { boss=new OlieMission(); }
}

// ══════════════════════════════════════════════════════
//  HOVED LØKKE
// ══════════════════════════════════════════════════════
let lastKey={};
function keyPressed(code) {
  if(keys[code]&&!lastKey[code]){ lastKey[code]=true; return true; }
  if(!keys[code]) lastKey[code]=false;
  return false;
}

function gameLoop() {
  requestAnimationFrame(gameLoop);
  waveOffset++;
  frameCount++;

  if(state==='start') {
    drawStartScreen(highScore);
    if(keyPressed('Enter')){ initAudio(); initGame(); state='game'; }
    return;
  }

  if(state==='bossintro') {
    drawOcean(stormAlpha);
    drawBossIntro(bossIntroData.title, bossIntroData.sub, bossIntroData.col);
    if(keyPressed('Enter')){ spawnBoss(pendingBossType); state='game'; }
    return;
  }

  if(state==='bossresult') {
    drawOcean(stormAlpha); drawLanes();
    drawBossResult(bossResultData.success, bossResultData.bonus);
    bossResultTimer--;
    if(bossResultTimer<=0) state='game';
    return;
  }

  if(state==='gameover') {
    drawGameOver(skib.score, highScore, reason);
    if(keyPressed('Enter')){ initGame(); state='game'; }
    if(keyPressed('Escape')){ stopEngine(); state='start'; }
    return;
  }

  // ── GAME TILSTAND ────────────────────────────────────
  worldSpeed = Math.min(10.0, worldSpeed+0.0008);
  skib.score += Math.floor(worldSpeed*0.15);
  if(engineNode) engineNode.frequency.value=50+worldSpeed*5;

  // Input
  if(keyPressed('ArrowUp')   && laneCooldown===0){ skib.moveUp();   laneCooldown=12; }
  if(keyPressed('ArrowDown') && laneCooldown===0){ skib.moveDown(); laneCooldown=12; }
  if(laneCooldown>0) laneCooldown--;

  if(keyPressed('Space')) {
    // Lever olie
    havne.forEach(h=>{
      if(h.active && skib.lane===h.lane && Math.abs(skib.x-h.x)<130 && skib.olie>0){
        skib.score+=skib.olie*Math.floor(worldSpeed); skib.olie=0; h.active=false; sfxDeliver();
      }
    });
    // Skyd på boss
    if(boss instanceof PiratskibBoss && boss.phase==='fight' && Math.abs(skib.x+120-boss.x)<240)
      boss.takeHit();
    if(boss instanceof BlæksprutteBoss && boss.phase==='fight' && Math.abs(skib.x+120-boss.x)<200)
      boss.takeHit();
  }

  skib.update();

  // Spawn (kun uden aktiv boss)
  if(!boss) {
    obsTimer--; if(obsTimer<=0){ obstacles.push(spawnObstacle(worldSpeed)); obsTimer=rndInt(Math.floor(80/worldSpeed*3),Math.floor(160/worldSpeed*3)); }
    tøndeTimer--; if(tøndeTimer<=0){ tønder.push(new OlieTønde(worldSpeed)); tøndeTimer=rndInt(40,90); }
    havnTimer--; if(havnTimer<=0){ havne.push(new Havn(worldSpeed)); havnTimer=rndInt(400,700); }
  }

  // Boss spawn
  if(!boss && bossCooldown<=0 && skib.score>=bossNextScore) {
    const types=['storm','pirat','blæk','mission'];
    pendingBossType=types[Math.floor(Math.random()*types.length)];
    const intros={
      storm:  {title:'STORM FORUDE!',        sub:'Hold farten oppe — stormfronten indhenter dig!', col:'#9664ff'},
      pirat:  {title:'PIRATSKIB!',           sub:'Undvig kugler — skyd tilbage med SPACE!',         col:'#b8a028'},
      'blæk': {title:'KÆMPE BLÆKSPRUTTE!',   sub:'Undgå tentaklerne — skyd med SPACE!',             col:'#b450e0'},
      mission:{title:'OLIE-MISSION!',        sub:'Saml 80 olie og lever til havn inden 30 sek!',   col:'#ffb400'},
    };
    bossIntroData=intros[pendingBossType];
    sfxBossWarn(); state='bossintro'; return;
  }
  if(bossCooldown>0) bossCooldown--;

  // Opdater boss
  if(boss instanceof StormfrontBoss) {
    boss.update(worldSpeed);
    stormAlpha=Math.min(200,Math.floor((boss.wallX+60)/W*180));
    if(boss.hitsShip(skib)) skib.takeHit(3);
    if(!boss.active){ bossResultData={success:true,bonus:500}; skib.score+=500; boss=null; stormAlpha=0; bossNextScore=skib.score+rndInt(800,1400); bossCooldown=300; bossResultTimer=120; state='bossresult'; }
  } else if(boss instanceof PiratskibBoss) {
    boss.update(worldSpeed);
    const sr=skib.getRect();
    boss.getCannonRects().forEach(kr=>{ if(rectsOverlap(sr,kr)) skib.takeHit(15); });
    if(!boss.active){ const s=boss.health<=0; bossResultData={success:s,bonus:s?400:0}; if(s) skib.score+=400; boss=null; bossNextScore=skib.score+rndInt(800,1400); bossCooldown=300; bossResultTimer=120; state='bossresult'; }
  } else if(boss instanceof BlæksprutteBoss) {
    boss.update(worldSpeed);
    const sr=skib.getRect();
    boss.getTentakelRects().forEach(tr=>{ if(rectsOverlap(sr,tr)) skib.takeHit(10); });
    if(!boss.active){ const s=boss.health<=0; bossResultData={success:s,bonus:s?450:0}; if(s) skib.score+=450; boss=null; bossNextScore=skib.score+rndInt(800,1400); bossCooldown=300; bossResultTimer=120; state='bossresult'; }
  } else if(boss instanceof OlieMission) {
    boss.update(skib.olie);
    if(!boss.active){ const s=boss.success; bossResultData={success:s,bonus:s?300:0}; if(s){skib.score+=300;skib.olie=0;} boss=null; bossNextScore=skib.score+rndInt(800,1400); bossCooldown=300; bossResultTimer=120; state='bossresult'; }
  }

  // Opdater objekter
  obstacles.forEach(o=>o.update()); tønder.forEach(t=>t.update()); havne.forEach(h=>h.update());

  // Kollision: forhindringer
  const sr=skib.getRect();
  obstacles.forEach(o=>{ if(!(o instanceof Delfinflok) && rectsOverlap(sr,o.getRect())) { const d=o instanceof Kaskelothval?12:o instanceof Isbjerg?8:6; skib.takeHit(d); } });

  // Saml tønder
  tønder.forEach(t=>{ if(!t.dead && rectsOverlap(sr,t.getRect()) && skib.olie<100){ skib.olie=Math.min(100,skib.olie+t.value); skib.score+=t.value; t.dead=true; sfxCollect(); } });

  // Ryd
  obstacles=obstacles.filter(o=>o.x>-200);
  tønder=tønder.filter(t=>t.x>-100&&!t.dead);
  havne=havne.filter(h=>h.x>-150);

  // Game over?
  if(skib.health<=0){ reason='Skibet sank!'; highScore=Math.max(highScore,skib.score); stopEngine(); state='gameover'; return; }

  // ── TEGNING ──────────────────────────────────────────
  drawOcean(stormAlpha); drawLanes();
  havne.forEach(h=>h.draw());
  tønder.forEach(t=>t.draw());
  obstacles.forEach(o=>o.draw());

  if(boss instanceof StormfrontBoss) boss.draw();
  skib.draw();
  if(boss instanceof PiratskibBoss || boss instanceof BlæksprutteBoss) boss.draw();
  if(boss instanceof OlieMission) boss.draw();

  drawHUD(skib, worldSpeed, highScore);
}

gameLoop();
</script>
</body>
</html>
